      properties:
        original:
          description: Valor original da cobrança.
          pattern: "^\\d{1,10}\\.\\d{2}$"
          title: Valor
          type: string
        multa:
          description: Multa aplicada à cobrança
          pattern: "^\\d{1,10}\\.\\d{2}$"
          title: Multa aplicada
          type: string
        juros:
          description: Juro aplicado à cobrança
          pattern: "^\\d{1,10}\\.\\d{2}$"
          title: Juro aplicado
          type: string
        abatimento:
          description: Abatimento aplicado à cobrança
