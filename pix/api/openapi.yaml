openapi: 3.0.0
info:
  contact:
    email: suporte.pix@bcb.gov.br
    name: Suporte PIX BCB
    url: https://www.bcb.gov.br/estabilidadefinanceira/pix
  description: |-
    <pre>[ Base URL: https://api.sicoob.com.br/pix/api/v2 ]</pre>
    A API Pix Sicoob é uma forma fácil e segura dos associados gerenciarem os seus recebimentos Pix. Ela permite criar cobranças e validar a situação do pagamento, bem como verificar os Pix recebidos.

    Seguindo os padrões definidos pelo Bacen, esta API utiliza as melhores práticas de segurança e possui autenticação com TLS mútuo, como uma medida adicional de proteção.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0
  title: API PIX
  version: 2.0.23.28
  x-ibm-name: api-pix
  x-sicoob-category: FINANCEIRA
servers:
- url: https://api.sicoob.com.br/pix/api/v2
security:
- oauth-mtls-sso:
  - cco_transferencias
  - cco_consulta
  - openid
tags:
- description: |-
    Reúne endpoints (locations) utilizados pelo software do PSP pagador para recuperar o payload JSON que representa uma cobrança.

    Os endpoints listados nesta Tag apresentam requisitos de autenticação e autorização diferenciados em relação aos outros endpoints listados na presente API.

    São endpoints __abertos__ para que qualquer cliente da internet possa se conectar. Cada _location_ é uma _[url de capacidade](https://www.w3.org/TR/capability-urls/)_, funcionalidade implementada via o fragmento `{pixUrlAccessToken}`.
    Para mais informações, consultar o [Manual de Padrões para iniciação do Pix](https://www.bcb.gov.br/estabilidadefinanceira/pix).
  name: CobPayload
  x-displayName: Reúne endpoints (locations) que retornam o  Payload JSON que representa
    uma Cobrança
- description: Reúne endpoints destinados a lidar com gerenciamento de cobranças imediatas.
  name: Cob
  x-displayName: Gerenciamento de cobranças para pagamento imediato
- description: Reúne endpoints destinados a lidar com gerenciamento de cobranças com
    vencimento.
  name: CobV
  x-displayName: Gerenciamento de cobranças com vencimento
- description: Reúne endpoints destinados a lidar com gerenciamento de cobranças com
    vencimento em lote.
  name: LoteCobV
  x-displayName: Gerenciamento de cobranças com vencimento em lote
- description: Reúne endpoints destinados a lidar com configuração e remoção de locations
    para uso dos payloads
  name: PayloadLocation
  x-displayName: Configuração de locations para payloads
- description: reúne endpoints destinados a lidar com  gerenciamento de Pix recebidos.
  name: Pix
  x-displayName: Gerenciamento de Pix recebidos
- description: Reúne endpoints para gerenciamento de notificações por parte do PSP
    recebedor ao usuário recebedor.
  name: Webhook
  x-displayName: Gerenciamento de notificações
paths:
  /cob/{txid}:
    get:
      description: Endpoint para consultar uma cobrança através de um determinado
        txid.
      parameters:
      - explode: false
        in: path
        name: txid
        required: true
        schema:
          $ref: "#/components/schemas/TxId"
        style: simple
      - explode: true
        in: query
        name: revisao
        required: false
        schema:
          $ref: "#/components/schemas/Revisao"
        style: form
      responses:
        "200":
          content:
            application/json:
              examples:
                retorno1:
                  $ref: "#/components/examples/cobResponse1"
                retorno2:
                  $ref: "#/components/examples/cobResponse2"
              schema:
                $ref: "#/components/schemas/CobCompleta"
          description: Dados da cobrança imediata.
        "403":
          content:
            application/problem+json:
              examples:
                exemplo1:
                  $ref: "#/components/examples/AcessoNegadoExample1"
              schema:
                $ref: "#/components/schemas/Problema"
          description: Requisição de participante autenticado que viola alguma regra
            de autorização.
        "404":
          content:
            application/problem+json:
              examples:
                exemplo1:
                  $ref: "#/components/examples/NaoEncontradoExample1"
              schema:
                $ref: "#/components/schemas/Problema"
          description: Recurso solicitado não foi encontrado.
        "503":
          content:
            application/problem+json:
              examples:
                exemplo1:
                  $ref: "#/components/examples/ServicoIndisponivelExample1"
              schema:
                $ref: "#/components/schemas/Problema"
          description: Serviço não está disponível no momento. Serviço solicitado
            pode estar em manutenção ou fora da janela de funcionamento.
      summary: Consultar cobrança imediata.
      tags:
      - Cob
      x-sicoob-category: FINANCEIRA
      x-accepts:
      - application/json
      - application/problem+json
    patch:
      description: Endpoint para revisar uma cobrança imediata.
      parameters:
      - explode: false
        in: path
        name: txid
        required: true
        schema:
          $ref: "#/components/schemas/TxId"
        style: simple
      requestBody:
        $ref: "#/components/requestBodies/CobBodyRevisada"
      responses:
        "200":
          content:
            application/json:
              examples:
                retorno1:
                  $ref: "#/components/examples/cobResponse3"
              schema:
                $ref: "#/components/schemas/CobGerada"
          description: Cobrança imediata revisada. A revisão deve ser incrementada
            em 1.
        "400":
          content:
            application/problem+json:
              examples:
