          $ref: "#/components/schemas/Informa__es_de_retirada"
      title: Valor da cobrança imediata
      type: object
    CobPayloadValor:
      description: "Todos os campos que indicam valores monetários obedecem ao pattern\
        \ \\d{1,10}\\.\\d{2}. O separador decimal é o caractere ponto. Não é aplicá\
        vel utilizar separador de milhar. Exemplos de valores aderentes ao padrão:\
        \ “1.00”, “123.99”, “123456789.23"
      properties:
        original:
          description: Valor original da cobrança.
          pattern: "^\\d{1,10}\\.\\d{2}$"
          title: Valor
          type: string
        modalidadeAlteracao:
          description: "Trata-se de um campo que determina se o valor final do documento\
