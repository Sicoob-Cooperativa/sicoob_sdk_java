  /cob:
    get:
      description: "Endpoint para consultar cobranças imediatas através de parâmetros\
        \ como início, fim, cpf, cnpj e status."
      parameters:
      - explode: true
        in: query
        name: inicio
        required: true
        schema:
          $ref: "#/components/schemas/Inicio"
        style: form
      - explode: true
        in: query
        name: fim
        required: true
        schema:
          $ref: "#/components/schemas/Fim"
        style: form
      - explode: true
        in: query
        name: cpf
        required: false
        schema:
          description: Filtro pelo CPF do devedor. Não pode ser utilizado ao mesmo
            tempo que o CNPJ.
          pattern: "^\\d{11}$"
          title: CPF
          type: string
        style: form
      - explode: true
        in: query
        name: cnpj
        required: false
        schema:
          description: Filtro pelo CNPJ do devedor. Não pode ser utilizado ao mesmo
            tempo que o CPF.
          pattern: "^\\d{14}$"
          title: CNPJ
          type: string
        style: form
      - explode: true
        in: query
        name: locationPresente
        required: false
        schema:
          type: boolean
        style: form
      - explode: true
        in: query
        name: status
        required: false
        schema:
          description: Filtro pelo status da cobrança.
          title: Status da Cobrança
          type: string
        style: form
      - explode: true
        in: query
        name: paginacao.paginaAtual
        required: false
        schema:
          default: 0
          description: "Página a ser retornada pela consulta. Se não for informada,\
            \ o PSP assumirá que será 0."
          format: int32
          minimum: 0
          title: Página atual
          type: integer
        style: form
      - explode: true
        in: query
        name: paginacao.itensPorPagina
        required: false
        schema:
          default: 100
          description: Quantidade máxima de registros retornados em cada página. Apenas
            a última página pode conter uma quantidade menor de registros.
          format: int32
          maximum: 1000
          minimum: 1
          title: Itens por Página
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              examples:
                getCobs1:
                  $ref: "#/components/examples/getCobs1"
                getCobs2:
                  $ref: "#/components/examples/getCobs2"
              schema:
                $ref: "#/components/schemas/CobsConsultadas"
          description: Lista de cobranças imediatas.
        "403":
          content:
            application/problem+json:
              examples:
                exemplo1:
                  $ref: "#/components/examples/AcessoNegadoExample1"
              schema:
                $ref: "#/components/schemas/Problema"
          description: Requisição de participante autenticado que viola alguma regra
            de autorização.
        "503":
          content:
