            exemplo1:
              $ref: "#/components/examples/ErroInternoServidorExample1"
          schema:
            $ref: "#/components/schemas/Error"
      description: Erro Interno do Servidor
  schemas:
    TxId:
      description: "# Identificador da transação\n\nO campo txid determina o identificador\
        \ da transação.\nO objetivo desse campo é ser um elemento que possibilite\
        \ ao PSP do recebedor apresentar ao usuário recebedor a funcionalidade de\
        \ conciliação de pagamentos.\n\nNa pacs.008, é referenciado como `TransactionIdentification\
        \ <txId>` ou `idConciliacaoRecebedor`.\n\nEm termos de fluxo de funcionamento,\
        \ o txid é lido pelo aplicativo do PSP do pagador e, \ndepois de confirmado\
        \ o pagamento, é enviado para o SPI via pacs.008. \nUma pacs.008 também é\
        \ enviada ao PSP do recebedor, contendo, além de todas as informações usuais\
        \ \ndo pagamento, o txid.\nAo perceber um recebimento dotado de txid, o PSP\
        \ do recebedor está apto a se comunicar com o usuário recebedor, \ninformando\
        \ que um pagamento específico foi liquidado.\n\nO txid é criado exclusivamente\
        \ pelo usuário recebedor e está sob sua responsabilidade.\nO txid, no contexto\
        \ de representação de uma cobrança, é único por CPF/CNPJ do usuário recebedor.\
        \ Cabe ao \nPSP recebedor validar essa regra na API Pix.\n"
      maxLength: 35
      pattern: "^[a-zA-Z0-9]{26,35}$"
      title: Id da Transação
      type: string
    EndToEndId:
      description: "EndToEndIdentification que transita na PACS002, PACS004 e PACS008"
      maxLength: 32
      minLength: 32
      pattern: "^[a-zA-Z0-9]{32}$"
      title: Id fim a fim da transação
      type: string
    DevolucaoId:
      description: Id gerado pelo cliente para representar unicamente uma devolução.
      pattern: "^[a-zA-Z0-9]{1,35}$"
      title: Id da Devolução
      type: string
    DevolucaoSolicitadaNatureza:
      description: "Indica qual é a natureza da devolução solicitada. Uma solicitaç\
        ão de devolução pelo usuário recebedor pode ser relacionada a um Pix\ncomum\
        \ (com código: `MD06` da pacs.004), ou a um Pix de Saque ou Troco (com có\
        digos possíveis: `MD06` e `SL02` da pacs.004). Na ausência \ndeste campo a\
        \ natureza deve ser interpretada como sendo de um Pix comum (`ORIGINAL`).\n\
        As naturezas são assim definidas:\n- `ORIGINAL`: quando a devolução é solicitada\
        \ pelo usuário recebedor e se refere a um Pix comum ou ao valor da compra\
        \ em um Pix Troco (`MD06`);\n- `RETIRADA`: quando a devolução é solicitada\
        \ pelo usuário recebedor e se refere a um Pix Saque ou ao valor do troco em\
        \ um Pix Troco (`SL02`).\nOs valores de devoluções são sempre limitados aos\
        \ valores máximos a seguir:\n- Pix comum: o valor da devolução é limitado\
        \ ao valor do próprio Pix (a natureza nesse caso deve ser: ORIGINAL);\n- Pix\
        \ Saque: o valor da devolução é limitado ao valor da retirada (a natureza\
        \ nesse caso deve ser: RETIRADA); e\n- Pix Troco: o valor da devolução é limitado\
        \ ao valor relativo à compra ou ao troco:\n  - Quando a devolução for referente\
        \ à compra, o valor limita-se ao valor da compra (a natureza nesse caso deve\
        \ ser ORIGINAL); e\n  - Quando a devolução for referente ao troco, o valor\
        \ limita-se ao valor do troco (a natureza nesse caso deve ser RETIRADA).\n"
      enum:
      - ORIGINAL
      - RETIRADA
      title: Natureza da Devolução Solicitada
      type: string
    DevolucaoNatureza:
      description: "Indica qual é a natureza da devolução. Uma devolução pode ser\
        \ relacionada a um Pix comum (com códigos possíveis: `MD06`, `BE08` e `FR01`\
        \ da pacs.004), \nou a um Pix de Saque ou Troco (com códigos possíveis:  `MD06`\
        \ e `SL02` da pacs.004). Na ausência deste campo a natureza deve ser interpretada\
        \ como \nsendo de um Pix comum (`ORIGINAL`).\nAs naturezas são assim definidas:\n\
        \  - `ORIGINAL`: quando a devolução é solicitada pelo usuário recebedor e\
        \ se refere a um Pix comum ou ao valor da compra em um Pix Troco (`MD06`);\n\
        \  - `RETIRADA`: quando a devolução é solicitada pelo usuário recebedor e\
        \ se refere a um Pix Saque ou ao valor do troco em um Pix Troco (`SL02`);\n\
        \  - `MED_OPERACIONAL`: quando a devolução ocorre no âmbito do MED por motivo\
        \ de falha operacional e se refere a um Pix comum (`BE08`);\n  - `MED_FRAUDE`:\
        \ quando a devolução ocorre no âmbito do MED por fundada suspeita de fraude\
        \ e se refere a um Pix comum (`FR01`).\nOs valores de devoluções são sempre\
        \ limitados aos valores máximos a seguir:\n- Pix comum: o valor da devoluç\
        ão é limitado ao valor do próprio Pix (a natureza nesse caso pode ser: ORIGINAL,\
        \ MED_OPERACIONAL ou MED_FRAUDE);\n- Pix Saque: o valor da devolução é limitado\
        \ ao valor da retirada (a natureza nesse caso deve ser: RETIRADA); e\n- Pix\
        \ Troco: o valor da devolução é limitado ao valor relativo à compra ou ao\
        \ troco:\n  - Quando a devolução for referente à compra, o valor limita-se\
        \ ao valor da compra (a natureza nesse caso deve ser ORIGINAL); e\n  - Quando\
        \ a devolução for referente ao troco, o valor limita-se ao valor do troco\
        \ (a natureza nesse caso deve ser RETIRADA).\n"
      enum:
      - ORIGINAL
      - RETIRADA
      - MED_OPERACIONAL
      - MED_FRAUDE
      title: Natureza da Devolução
      type: string
    PayloadLocationId:
      description: Identificador da location a ser informada na criação da cobrança
        .
      format: int64
      readOnly: true
      title: Id da location
      type: integer
    Revisao:
      description: |
        # O campo `revisao`

        Denota a revisão da cobrança.  Sempre começa em zero. Sempre varia em acréscimos de 1.

        O incremento em uma cobrança deve ocorrer sempre que um objeto da cobrança em questão for alterado.
        O campo `loc` é uma exceção a esta regra.

        Se em uma determinada alteração em uma cobrança, o único campo alterado for o campo `loc`,
        então esta operação não incrementa a revisão da cobrança.

        O campo `loc` não ocasiona uma alteração na cobrança em si.
        Não é necessário armazenar histórico das alterações do campo `loc` para uma determinada cobrança.
        Para os outros campos da cobrança, registra-se histórico.
      format: int32
      title: Revisão
      type: integer
    PessoaFisica:
      additionalProperties: false
      example:
        cpf: "10987654321"
        nome: nome
      properties:
        cpf:
          example: "10987654321"
          pattern: "^[0-9]{11}$"
          type: string
        nome:
          description: Nome do usuário.
          maxLength: 200
