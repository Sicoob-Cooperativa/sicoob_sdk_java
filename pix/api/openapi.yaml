            município do usuário pagador.
          title: Ajuste data prevista para liquidação para próximo dia útil
          type: boolean
        recebedor:
          $ref: "#/components/schemas/CobrancaRecorrenteSolicitada_recebedor"
        devedor:
          $ref: "#/components/schemas/Dados_do_devedor_"
      required:
