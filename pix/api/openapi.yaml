    Pix:
      example:
        horario: 2000-01-23T04:56:07.000+00:00
        devolucoes:
        - motivo: motivo
          horario:
            solicitacao: 2000-01-23T04:56:07.000+00:00
            liquidacao: 2000-01-23T04:56:07.000+00:00
          rtrId: D12345678202009091000abcde123456
          valor: valor
          id: id
          natureza: ORIGINAL
          descricao: descricao
          status: EM_PROCESSAMENTO
        - motivo: motivo
          horario:
            solicitacao: 2000-01-23T04:56:07.000+00:00
            liquidacao: 2000-01-23T04:56:07.000+00:00
          rtrId: D12345678202009091000abcde123456
          valor: valor
          id: id
          natureza: ORIGINAL
          descricao: descricao
          status: EM_PROCESSAMENTO
        valor: "100.00"
        chave: chave
        txid: ""
        infoPagador: infoPagador
        endToEndId: endToEndId
      properties:
        endToEndId:
          description: "EndToEndIdentification que transita na PACS002, PACS004 e\
            \ PACS008"
          maxLength: 32
          minLength: 32
          pattern: "^[a-zA-Z0-9]{32}$"
          title: Id fim a fim da transação
          type: string
        txid:
          allOf:
          - $ref: "#/components/schemas/TxId"
        valor:
          description: Valor do Pix.
          example: "100.00"
          pattern: "^\\d{1,10}\\.\\d{2}$"
          title: Valor do Pix.
          type: string
        chave:
          description: |
            # Formato do campo chave

            * Campo chave do recebedor conforme atribuído na respectiva PACS008.
            * Os tipos de chave podem ser: telefone, e-mail, cpf/cnpj ou EVP.
            * O formato das chaves pode ser encontrado na seção "Formatação das chaves do DICT no BR Code" do [Manual de Padrões para iniciação do Pix](https://www.bcb.gov.br/estabilidadefinanceira/pagamentosinstantaneos).
          maxLength: 77
          title: Chave DICT do recebedor
          type: string
        horario:
          description: Horário em que o Pix foi processado no PSP.
          format: date-time
          title: Horário
          type: string
        infoPagador:
          maxLength: 140
          title: Informação livre do pagador
          type: string
        devolucoes:
          items:
            $ref: "#/components/schemas/Devolucao"
          title: Devoluções
          type: array
      required:
      - endToEndId
      - horario
      - pagador
      - valor
      title: Pix
      type: object
    Devolucao:
      example:
        motivo: motivo
        horario:
          solicitacao: 2000-01-23T04:56:07.000+00:00
          liquidacao: 2000-01-23T04:56:07.000+00:00
        rtrId: D12345678202009091000abcde123456
        valor: valor
        id: id
        natureza: ORIGINAL
        descricao: descricao
        status: EM_PROCESSAMENTO
      properties:
        id:
          description: Id gerado pelo cliente para representar unicamente uma devolução.
          pattern: "^[a-zA-Z0-9]{1,35}$"
          title: Id da Devolução
          type: string
        rtrId:
          description: ReturnIdentification que transita na PACS004.
          example: D12345678202009091000abcde123456
          maxLength: 32
          minLength: 32
          pattern: "[a-zA-Z0-9]{32}"
          title: RtrId
          type: string
        valor:
          description: Valor a devolver.
          pattern: "^\\d{1,10}\\.\\d{2}$"
          title: Valor a devolver.
          type: string
        natureza:
          $ref: "#/components/schemas/DevolucaoNatureza"
        descricao:
          description: "O campo `descricao`, opcional, determina um texto a ser apresentado\
            \ ao pagador contendo informações sobre a devolução. Esse texto será preenchido,\
            \ na pacs.004, pelo PSP do recebedor, no campo RemittanceInformation.\
            \ O tamanho do campo na pacs.004 está limitado a 140 caracteres."
          maxLength: 140
          title: Mensagem ao pagador relativa à devolução.
          type: string
        horario:
          $ref: "#/components/schemas/Devolucao_horario"
        status:
          description: Status da devolução.
          enum:
          - EM_PROCESSAMENTO
          - DEVOLVIDO
          - NAO_REALIZADO
          title: Status
          type: string
        motivo:
          description: |
            # Status da Devolução
            Campo opcional que pode ser utilizado pelo PSP recebedor para detalhar os motivos
            de a devolução ter atingido o status em questão.
            Pode ser utilizado, por exemplo, para detalhar o motivo de a devolução não ter sido realizada.
          maxLength: 140
          title: Descrição do status.
          type: string
      required:
      - horario
      - id
      - rtrId
      - status
      - valor
      title: Devolução
      type: object
    DevolucaoSolicitada:
      example:
        valor: valor
        natureza: ORIGINAL
        descricao: descricao
      properties:
