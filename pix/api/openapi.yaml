    Cobran_a_imediata_vinculada___Jornada_3:
      description: "Dado de preenchimento obrigatório quando utilizada a Jornada 3.\
        \ Este campo deve ser removido pelo PSP Recebedor quando a ativação for realizada\
        \ pelas jornadas 1, 2 ou 4."
      properties:
        txid:
          description: "# Identificador da transação\n\nO campo txid determina o identificador\
            \ da transação.\nO objetivo desse campo é ser um elemento que possibilite\
            \ ao PSP do recebedor apresentar ao usuário recebedor a funcionalidade\
            \ de conciliação de pagamentos.\n\nNa pacs.008, é referenciado como `TransactionIdentification\
            \ <txId>` ou `idConciliacaoRecebedor`.\n\nEm termos de fluxo de funcionamento,\
            \ o txid é lido pelo aplicativo do PSP do pagador e, \ndepois de confirmado\
            \ o pagamento, é enviado para o SPI via pacs.008. \nUma pacs.008 també\
            m é enviada ao PSP do recebedor, contendo, além de todas as informaçõ\
            es usuais \ndo pagamento, o txid.\nAo perceber um recebimento dotado de\
            \ txid, o PSP do recebedor está apto a se comunicar com o usuário recebedor,\
            \ \ninformando que um pagamento específico foi liquidado.\n\nO txid é\
            \ criado exclusivamente pelo usuário recebedor e está sob sua responsabilidade.\n\
            O txid, no contexto de representação de uma cobrança, é único por CPF/CNPJ\
            \ do usuário recebedor. Cabe ao \nPSP recebedor validar essa regra na\
            \ API Pix.\n"
          maxLength: 35
          pattern: "^[a-zA-Z0-9]{26,35}$"
          title: Id da Transação
          type: string
      required:
      - txid
      title: Cobrança imediata vinculada à Jornada 3
      type: object
