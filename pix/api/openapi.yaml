        required: false
        schema:
          $ref: "#/components/schemas/Fim"
        style: form
      - explode: true
        in: query
        name: paginacao.paginaAtual
        required: false
        schema:
          default: 0
          description: "Página a ser retornada pela consulta. Se não for informada,\
            \ o PSP assumirá que será 0."
          format: int32
          minimum: 0
          title: Página atual
          type: integer
        style: form
      - explode: true
        in: query
        name: paginacao.itensPorPagina
        required: false
        schema:
          default: 100
          description: Quantidade máxima de registros retornados em cada página. Apenas
            a última página pode conter uma quantidade menor de registros.
          format: int32
          maximum: 1000
          minimum: 1
          title: Itens por Página
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              examples:
                getCobs1:
                  $ref: "#/components/examples/getWebhook1"
              schema:
                $ref: "#/components/schemas/WebhooksConsultados"
          description: lista dos locations cadastrados de acordo com o critério de
            busca.
        "403":
          content:
            application/problem+json:
              examples:
                exemplo1:
                  $ref: "#/components/examples/AcessoNegadoExample1"
              schema:
                $ref: "#/components/schemas/Problema"
          description: Requisição de participante autenticado que viola alguma regra
            de autorização.
        "503":
          content:
            application/problem+json:
              examples:
                exemplo1:
                  $ref: "#/components/examples/ServicoIndisponivelExample1"
              schema:
                $ref: "#/components/schemas/Problema"
          description: Serviço não está disponível no momento. Serviço solicitado
            pode estar em manutenção ou fora da janela de funcionamento.
      summary: Consultar webhooks cadastrados.
      tags:
      - Webhook
      x-sicoob-category: FINANCEIRA
      x-accepts:
      - application/json
      - application/problem+json
