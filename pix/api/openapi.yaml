    CobVPayloadValor:
      description: "Todos os campos que indicam valores monetários obedecem ao formato\
        \ do ID 54 da especificação EMV/BR Code para QR Codes. O separador decimal\
        \ é o caractere ponto. Não é aplicável utilizar separador de milhar. Exemplos\
