              examples:
                exemplo1:
                  $ref: "#/components/examples/ServicoIndisponivelExample1"
              schema:
                $ref: "#/components/schemas/Problema"
          description: Serviço não está disponível no momento. Serviço solicitado
            pode estar em manutenção ou fora da janela de funcionamento.
      summary: Consultar lista de cobranças imediatas.
      tags:
      - Cob
      x-sicoob-category: FINANCEIRA
      x-accepts:
      - application/json
      - application/problem+json
    post:
      description: "Endpoint para criar uma cobrança imediata, neste caso, o txid\
        \ deve ser definido pelo PSP."
      requestBody:
        $ref: "#/components/requestBodies/CobBody"
      responses:
        "201":
          content:
            application/json:
              examples:
                retorno1:
                  $ref: "#/components/examples/cobResponse1"
              schema:
                $ref: "#/components/schemas/CobGerada"
          description: Cobrança imediata criada
        "400":
          content:
            application/problem+json:
              examples:
                exemplo1:
                  $ref: "#/components/examples/RequisicaoInvalidaCobExample1"
              schema:
                $ref: "#/components/schemas/Problema"
          description: Requisição com formato inválido.
        "403":
          content:
            application/problem+json:
              examples:
                exemplo1:
                  $ref: "#/components/examples/AcessoNegadoExample1"
              schema:
                $ref: "#/components/schemas/Problema"
          description: Requisição de participante autenticado que viola alguma regra
            de autorização.
        "503":
          content:
            application/problem+json:
              examples:
                exemplo1:
                  $ref: "#/components/examples/ServicoIndisponivelExample1"
              schema:
                $ref: "#/components/schemas/Problema"
          description: Serviço não está disponível no momento. Serviço solicitado
            pode estar em manutenção ou fora da janela de funcionamento.
      summary: Criar cobrança imediata.
      tags:
      - Cob
      x-sicoob-category: FINANCEIRA
      x-content-type: application/json
      x-accepts:
      - application/json
      - application/problem+json
