    Informa__es_de_retirada_1:
      description: "É uma estrutura opcional relacionada ao conceito de recebimento\
        \ de numerário. Apenas um agrupamento por vez é permitido, quando há `saque`\
        \ não há `troco` e vice-versa. \nQuando uma cobrança imediata tem uma estrutura\
        \ de `retirada` ela deixa de ser considerada Pix comum e passa à categoria\
        \ de Pix Saque ou Pix Troco. \nPara que o preenchimento do objeto `retirada`\
        \ seja considerado válido as seguintes regras se aplicam:\n- os campos `modalidadeAgente`\
        \ e `prestadorDoServicoDeSaque` são de **preenchimento obrigatório**;\n- quando\
        \ o `saque` estiver presente a cobrança deve respeitar as seguintes condiç\
        ões:\n  - O campo `valor.original` deve ser preenchido com **valor igual a\
        \ 0.00 (zero)**;\n  - O campo `valor.modalidadeAlteracao` deve possuir o valor\
        \ 0 (zero) explicitamente, ou implicitamente (pelo não preenchimento).\n-\
        \ quando o `troco` estiver presente a cobrança deve respeitar as seguintes\
        \ condições:\n  - O campo `valor.original` deve ser preenchido com **valor\
        \ maior que 0.00 (zero)**;\n  - O campo `valor.modalidadeAlteracao` deve possuir\
        \ o valor 0 (zero) explicitamente, ou implicitamente (pelo não preenchimento).\n\
        **IMPORTANTE**: Quando usados o `saque` ou `troco` não será permitida a alteraç\
        ão do `valor.original` recebido. Na presença de `saque` ou `troco` o recebimento\
        \ do campo `valor.modalidadeAlteracao` com valor 1 (um) é considerado erro.\n\
        #### Exemplos válidos:\nConsiderando os campos da estrutura `valor` e o predicado\
        \ 'presente' cujo resultado é verdade quando a estrutura apontada é encontrada\
        \ temos: \n- **uma cobrança com valor fixo** (condições: valor.original >\
        \ 0 && valor.modalidadeAlteração = 0 && !presente(valor.retirada))\n  ```\n\
        \  ...\n  \"valor\": {\n    \"original\": \"10.00\"\n  },\n  ...\n  ```\n\
        - **uma cobrança com valor alterável** (condições: valor.original >= 0.00\
        \ && modalidadeAlteração = 1 && !presente(valor.retirada))\n  ```\n  ...\n\
        \  \"valor\": {\n    \"original\": \"10.00\",\n    \"modalidadeAlteracao\"\
        : 1\n  },\n  ```\n- **saque com valor fixo** (condições: valor.original =\
        \ 0.00 && valor.modalidadeAlteração = 0 && presente(valor.retirada.saque)\
        \ && valor.retirada.saque.valor > 0 && valor.retirada.saque.modalidadeAlteracao\
        \ = 0)\n  ```\n  ...\n  \"valor\": {\n    \"original\": \"0.00\",\n    \"\
        retirada\": {\n      \"saque\": {\n        \"valor\": \"5.00\",\n        \"\
        modalidadeAgente\": \"AGPSS\",\n        \"prestadorDoServicoDeSaque\": \"\
        12345678\"\n      }\n    }\n  },\n  ...\n  ```\n- **saque com valor alterá\
        vel** (condições: valor.original = 0.00 && valor.modalidadeAlteração = 0 &&\
        \ presente(valor.retirada.saque) && valor.retirada.saque.valor >= 0 && valor.retirada.saque.modalidadeAlteracao\
        \ = 1)\n  ```\n  ...\n  \"valor\": {\n    \"original\": \"0.00\",\n    \"\
        retirada\": {\n      \"saque\": {\n        \"valor\": \"5.00\",\n        \"\
        modalidadeAlteracao\": 1,\n        \"modalidadeAgente\": \"AGPSS\",\n    \
        \    \"prestadorDoServicoDeSaque\": \"12345678\"\n      }\n    }\n  },\n \
        \ ...\n  ```\n- **cobrança com troco fixo** (condições: valor.original > 0.00\
        \ && valor.modalidadeAlteração = 0 && presente(valor.retirada.troco) && valor.retirada.troco.valor\
        \ > 0 && valor.retirada.troco.modalidadeAlteracao = 0)\n  ```\n  ...\n  \"\
        valor\": {\n    \"original\": \"10.00\",\n    \"retirada\": {\n      \"troco\"\
        : {\n        \"valor\": \"5.00\",\n        \"modalidadeAgente\": \"AGTEC\"\
        ,\n        \"prestadorDoServicoDeSaque\": \"12345678\"\n      }\n    }\n \
        \ },\n  ...\n  ```\n- **cobrança com troco alterável** (condições: valor.original\
        \ > 0.00 && valor.modalidadeAlteração = 0 && presente(valor.retirada.troco)\
        \ && valor.retirada.troco.valor >= 0 && valor.retirada.troco.modalidadeAlteracao\
        \ = 1)\n  ```\n  ...\n    \"valor\": {\n      \"original\": \"10.00\",\n \
        \     \"retirada\": {\n        \"troco\": {\n          \"valor\": \"0.00\"\
        ,\n          \"modalidadeAlteracao\": 1,\n          \"modalidadeAgente\":\
        \ \"AGTEC\",\n          \"prestadorDoServicoDeSaque\": \"12345678\"\n    \
        \    }\n      }\n    },\n  ...\n  ```\n#### Exemplos inválidos:\nAbaixo alguns\
        \ exemplos que **não são válidos**. Convém observar que esta listagem não\
        \ tem pretensão de ser completa, sendo tão somente uma referência para alguns\
        \ erros possíveis.\n- **saque sem `modalidadeAgente` e `prestadorDoServicoDeSaque`**\
        \ \n  ```\n  ...\n  \"valor\": {\n    \"original\": \"0.00\",\n    \"retirada\"\
        : {\n      \"saque\": {\n        \"valor\": \"5.00\"\n      }\n    }\n  },\n\
        \  ...\n  ```\n- **cobrança com saque e troco juntos** (não pode ter os dois\
        \ ao mesmo tempo)\n  ```\n  ...\n  \"valor\": {\n    \"original\": \"100.00\"\
        ,\n    \"retirada\": {\n      \"saque\": {\n        \"valor\": \"50.00\",\n\
        \        \"modalidadeAgente\": \"AGPSS\",\n        \"prestadorDoServicoDeSaque\"\
        : \"12345678\"\n      },\n      \"troco\": {\n        \"valor\": \"30.00\"\
        ,\n        \"modalidadeAgente\": \"AGTEC\",\n        \"prestadorDoServicoDeSaque\"\
        : \"12345678\"\n      }\n    }\n  },\n  ...\n  ```\n- **saque com valor.original\
        \ maior que 0.00 (zero)** (saque requer valor.original = 0.00)\n  ```\n  ...\n\
        \  \"valor\": {\n    \"original\": \"10.00\",\n    \"retirada\": {\n     \
        \ \"saque\": {\n        \"valor\": \"5.00\",\n        \"modalidadeAgente\"\
        : \"AGPSS\",\n        \"prestadorDoServicoDeSaque\": \"12345678\"\n      }\n\
        \    }\n  },\n  ...\n  ```\n- **troco com valor.original igual a 0.00 (zero)**\
        \ (para haver troco tem que haver valor.original > 0.00)\n  ```\n  ...\n \
        \ \"valor\": {\n    \"original\": \"0.00\",\n    \"retirada\": {\n      \"\
        troco\": {\n        \"valor\": \"5.00\",\n        \"modalidadeAgente\": \"\
        AGTEC\",\n        \"prestadorDoServicoDeSaque\": \"12345678\"\n      }\n \
        \   }\n  },\n  ...\n  ```\n- **saque com valor.original alterável** (não se\
        \ pode alterar o valor.original na presença do saque)\n  ```\n  ...\n  \"\
        valor\": {\n    \"original\": \"0.00\",\n    \"modalidadeAlteracao\": 1,\n\
        \    \"retirada\": {\n      \"saque\": {\n        \"valor\": \"5.00\",\n \
        \       \"modalidadeAlteracao\": 1,\n        \"modalidadeAgente\": \"AGPSS\"\
        ,\n        \"prestadorDoServicoDeSaque\": \"12345678\"\n      }\n    }\n \
        \ },\n  ...\n  ```\n- **troco com valor.original alterável** (não se pode\
        \ alterar o valor.original na presença do troco)\n  ```\n  ...\n  \"valor\"\
        : {\n    \"original\": \"0.01\",\n    \"modalidadeAlteracao\": 1,\n    \"\
        retirada\": {\n      \"troco\": {\n        \"valor\": \"5.00\",\n        \"\
        modalidadeAlteracao\": 1,\n        \"modalidadeAgente\": \"AGTOT\",\n    \
        \    \"prestadorDoServicoDeSaque\": \"12345678\"\n      }\n    }\n  },\n \
        \ ...\n  ```\n"
      oneOf:
      - $ref: "#/components/schemas/Informa__es_de_retirada_1_oneOf"
      - $ref: "#/components/schemas/Informa__es_de_retirada_1_oneOf_1"
      title: Informações de retirada
      type: object
