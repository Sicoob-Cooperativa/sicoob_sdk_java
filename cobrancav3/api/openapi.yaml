              - 0 Isento
              - 1 Valor Fixo
              - 2 Percentual
          example: 1
          type: integer
        dataMulta:
          description: |-
            Deve ser maior que a data de vencimento do boleto e menor ou igual que data limite de pagamento.
            Formato: yyyy-MM-dd
          example: 2025-11-05
          format: date
          type: string
        valorMulta:
          description: Valor da multa. Deve ser preenchido caso o campo dataMulta
            seja preenchido.
          example: 5.5
          format: double
          type: number
        tipoJurosMora:
          description: |-
            Tipo de juros de mora. Informar os valores listados abaixo.
              - 1 Valor por dia
              - 2 Taxa Mensal
              - 3 Isento
          example: 1
          type: integer
        dataJurosMora:
          description: |-
            Deve ser maior que a data de vencimento do boleto e menor ou igual que data limite de pagamento.
            Formato: yyyy-MM-dd
          example: 2025-11-05
          format: date
          type: string
        valorJurosMora:
          description: Valor do juros de mora. Deve ser preenchido caso o campo dataJurosMora
            seja preenchido.
          example: 4.5
          format: double
          type: number
        numeroParcela:
          description: Número da parcela do boleto.Valor máximo permitido '99'.
          example: 1
          format: int64
          type: integer
        aceite:
          description: Identificador do aceite do boleto.
          example: true
          type: boolean
        codigoNegativacao:
          description: |-
            Código de negativação do boleto. Informar os valores abaixo.
              - 2 Negativar Dias Úteis
              - 3 Não Negativar
          example: 2
          type: integer
        numeroDiasNegativacao:
          description: Número de dias para negativação do boleto. Deve ser preenchido
            caso o campo codigoNegativacao seja igual a '2'. `Tamanho máximo 99`
          example: 60
          type: integer
        codigoProtesto:
          description: |-
            Código de protesto do boleto. Informar os valores abaixo.
              - 1 Protestar Dias Corridos
              - 2 Protestar Dias Úteis
              - 3 Não Protestar
          example: 1
          type: integer
        numeroDiasProtesto:
          description: Número de dias para protesto do boleto. Deve ser preenchido
            caso o campo codigoProtesto seja '1'. `Tamanho máximo 99`
