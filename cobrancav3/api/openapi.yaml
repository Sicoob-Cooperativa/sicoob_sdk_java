          description: "Número que identifica o boleto de cobrança no Sisbr. Caso\
            \ deseje, o beneficiário poderá informar o nossoNumero."
          example: 123456789012345678
          format: int32
          type: integer
        seuNumero:
          description: Número identificador do boleto no sistema do beneficiário.
            `Tamanho máximo 18`
          example: "012345678901234567"
          type: string
        identificacaoBoletoEmpresa:
          description: Campo destinado para uso da empresa do beneficiário para identificação
            do boleto. `Tamanho máximo 25`
          example: "01234567890123456789"
          type: string
        identificacaoEmissaoBoleto:
          description: Código de identificação de emissão do boleto. Informar os valores
            listados abaixo. - 1 Banco Emite - 2 Cliente Emite
          example: 1
          type: integer
        identificacaoDistribuicaoBoleto:
          description: Código de identificação de distribuição do boleto. Informar
            os valores listados abaixo. - 1 Banco Distribui - 2 Cliente Distribui
          example: 1
          type: integer
        valor:
