            Data de limite para pagamento do boleto.
            Formato: yyyy-MM-dd
          example: 2025-11-05
          format: date
          type: string
        valorAbatimento:
          description: Valor do abatimento a ser aplicado no boleto.
          example: 5.57
          format: double
          type: number
        tipoDesconto:
          description: |-
            Informar o tipo de desconto atribuido ao boleto.
                              - 0 Sem Desconto
                              - 1 Valor Fixo Até a Data Informada
                              - 2 Percentual até a data informada
                              - 3 Valor por antecipação dia corrido
                              - 4 Valor por antecipação dia útil
                              - 5 Percentual por antecipação dia corrido
                              - 6 Percentual por antecipação dia útil
          example: 1
          format: int64
          type: integer
        dataPrimeiroDesconto:
          description: |
            Data do primeiro desconto. Deve ser informado caso o tipo de desconto seja diferente de 0.
            Formato: yyyy-MM-dd
          example: 2025-09-15
          format: date
          type: string
        valorPrimeiroDesconto:
          description: Valor do primeiro desconto. Deve ser informado caso a data
            do primeiro desconto seja preenchida.
          example: 22.5
          format: double
          type: number
        dataSegundoDesconto:
          description: |
            Data do segundo desconto.
            Formato: yyyy-MM-dd
          example: 2025-09-20
          format: date
          type: string
        valorSegundoDesconto:
          description: Valor do segundo desconto. Deve ser informado caso a data do
            segundo desconto seja preenchida.
          example: 15.5
          format: double
          type: number
        dataTerceiroDesconto:
          description: |
            Data do terceiro desconto.
