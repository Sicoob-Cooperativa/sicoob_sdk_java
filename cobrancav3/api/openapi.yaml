openapi: 3.0.1
info:
  contact:
    email: GrupoGesin1CobrancaBancaria@sicoob.com.br
    name: Equipe COBRANÇA BANCÁRIA
  description: |-
    <pre>[ Base URL: https://api.sicoob.com.br/cobranca-bancaria/v3 ]</pre>
    A Cobrança Bancária Sicoob é um conjunto de serviços oferecidos a seus associados para recebimento de valores referentes às vendas de produtos e serviços da sua empresa, por meio de boletos de cobrança, pagos em toda a rede bancária. Esta API disponibiliza funcionalidades que auxiliam na gestão da carteira registrada, tornando viável todo o processo de acompanhamento, desde a inclusão de novos boletos, alteração de informações relevantes, protesto/negativação de títulos vencidos e não pagos, até a liquidação ou baixa do título.
  title: Cobrança Bancária
  version: 3.0.8.0
  x-ibm-name: cobranca-bancaria-v3
servers:
- url: https://api.sicoob.com.br/cobranca-bancaria/v3
security:
- oauth2:
  - cco_transferencias
  - cco_consulta
  - openid
tags:
- description: Inclusão e Manutenção de Boleto Bancário.
  name: Boleto
- description: Inclusão e Manutenção de Pagador.
  name: Pagador
- description: Negativação de Boleto Bancário Vencido e Não Pago.
  name: Negativação
- description: Protesto de Boleto Bancário Vencido e Não Pago.
  name: Protesto
- description: Gestão da Carteira de Cobrança Bancária.
  name: Movimentação
- description: Webhook para notificação periódicas de eventos associados a diferentes
    tipos de movimento.
  name: Webhook
- description: Serviços de apoio da API
  name: Apoio
paths:
  /boletos:
    get:
      description: "Serviço para consulta de um boleto bancário. Utiliza as informaç\
        ões do beneficiário logado (número da cooperativa, número identificador do\
        \ beneficiário e conta corrente), juntamente com a informação do identificador\
        \ do boleto (nosso número), ou da linha digitável ou do código de barras."
      parameters:
      - description: Número que identifica o contrato do beneficiário no Sisbr.
        in: query
        name: numeroCliente
        required: true
        schema:
          type: integer
      - description: "Identifica a modalidade do boleto.\n- 1 - SIMPLES COM REGISTRO\n\
          - 3 - CAUCIONADA\n- 4 - VINCULADA\n- 5 - CARNÊ DE PAGAMENTOS \n- 8 - COBRANÇ\
          A CONTA CAPITAL"
        in: query
        name: codigoModalidade
        required: true
        schema:
          type: integer
      - description: "Número identificador do boleto no Sisbr. Caso seja infomado,\
          \ não é necessário infomar a linha digitável ou código de barras."
        in: query
        name: nossoNumero
        schema:
          type: integer
      - description: "Número da linha digitável do boleto com 47 posições. Caso seja\
          \ informado, não é necessário informar o nosso número ou código de barras."
        in: query
        name: linhaDigitavel
        schema:
          type: string
      - description: "Número de código de barras do boleto com 44 posições.Caso seja\
          \ informado, não é necessário informar o nosso número ou linha digitável."
        in: query
        name: codigoBarras
        schema:
          type: string
      - description: Indicar o id do contatro de cobrança
        in: query
        name: numeroContratoCobranca
        schema:
          format: int32
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_boletos_get_200_response"
          description: ""
        "204":
          content: {}
          description: A requisição foi processada com êxito e não está retornando
            conteúdo.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Possíveis erros de negócio.
        "406":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Possíveis erros de inconsistência nos dados passados.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Erro interno.
      summary: Consultar boleto
      tags:
      - Boleto
      x-sicoob-category: NÃO FINANCEIRA
      x-accepts:
      - application/json
    post:
      description: Serviço para a inclusão de boletos. É possível a inclusão de 1
        boleto por requisição.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Boleto"
        description: Inclusão das informações detalhadas do boleto de cobrança.
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_boletos_post_200_response"
          description: Solicitação recebida com sucesso.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Possíveis erros de negócio.
        "406":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Possíveis erros de inconsistência nos dados passados.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Erro interno.
      summary: Incluir boletos
      tags:
      - Boleto
      x-sicoob-category: NÃO FINANCEIRA
      x-codegen-request-body-name: boleto
      x-content-type: application/json
      x-accepts:
      - application/json
  /pagadores/{numeroCpfCnpj}/boletos:
    get:
      description: Serviço para listagem de boletos por Pagador.
      parameters:
      - description: CPF ou CNPJ do pagador. `Tamanho máximo 14`
        in: path
        name: numeroCpfCnpj
        required: true
        schema:
          type: string
      - description: Número que identifica o contrato do beneficiário no Sisbr.
        in: query
        name: numeroCliente
        required: true
        schema:
          type: integer
      - description: |-
          Código da Situação do Boleto.
            - 1 Entrada Normal
            - 2 Baixado
            - 3 Liquidado
        in: query
        name: codigoSituacao
        schema:
          type: integer
      - description: |
          Data de Vencimento Inicial.
          Formato: yyyy-MM-dd
        in: query
        name: dataInicio
        schema:
          format: date
          type: string
      - description: |
          Data de Vencimento Final.
          Formato: yyyy-MM-dd
        in: query
        name: dataFim
        schema:
          format: date
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_pagadores__numeroCpfCnpj__boletos_get_200_response"
          description: ""
        "204":
          content: {}
          description: A requisição foi processada com êxito e não está retornando
            conteúdo.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Possíveis erros de negócio.
        "406":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Possíveis erros de inconsistência nos dados passados.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Erro interno.
      summary: Listar Boletos por Pagador
      tags:
      - Boleto
      x-sicoob-category: NÃO FINANCEIRA
      x-accepts:
      - application/json
  /boletos/segunda-via:
    get:
      description: "Serviço para emissão da segunda via de boleto já registrado. Utiliza\
        \ as informações do beneficiário logado (número da cooperativa, número identificador\
        \ do beneficiário e conta corrente), juntamente com a informação do identificador\
        \ do boleto (nosso número), ou da linha digitável ou do código de barras.\
        \ Quando informados código de barras ou linha digitável, a pesquisa é realiazada\
        \ prioritariamente por estes parâmetros."
      parameters:
      - description: Número que identifica o contrato do beneficiário no Sisbr.
        in: query
        name: numeroCliente
        required: true
        schema:
          type: integer
      - description: "Identifica a modalidade do boleto.\n- 1 - SIMPLES COM REGISTRO\n\
          - 3 - CAUCIONADA\n- 4 - VINCULADA\n- 5 - CARNÊ DE PAGAMENTOS \n- 8 - COBRANÇ\
          A CONTA CAPITAL"
        in: query
        name: codigoModalidade
        required: true
        schema:
          type: integer
      - description: "Número identificador do boleto no Sisbr.Caso seja informado,\
          \ não é necessário informar a linha digitável ou código de barras."
        in: query
        name: nossoNumero
        schema:
          type: integer
      - description: "Número da linha digitável do boleto com 47 posições.Caso seja\
          \ informado, não é necessário informar o nosso número ou código de barras."
        in: query
        name: linhaDigitavel
        schema:
          type: string
      - description: "Número de código de barras do boleto com 44 posições.Caso seja\
          \ informado, não é necessário informar o nosso número ou a linha digitá\
          vel."
        in: query
        name: codigoBarras
        schema:
          type: string
      - description: Identificador para o sistema devolver ou não o PDF do Boleto.
          O PDF será retornado na Base64.
        in: query
        name: gerarPdf
        schema:
          type: boolean
      - description: Indicar o id do contatro de cobrança
        in: query
        name: numeroContratoCobranca
        schema:
          format: int64
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_boletos_segunda_via_get_200_response"
          description: ""
        "204":
          content: {}
          description: A requisição foi processada com êxito e não está retornando
            conteúdo.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Possíveis erros de negócio.
        "406":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Possíveis erros de inconsistência nos dados passados.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Erro interno.
      summary: Emitir segunda via de um boleto
      tags:
      - Boleto
      x-sicoob-category: NÃO FINANCEIRA
      x-accepts:
      - application/json
  /boletos/faixas-nosso-numero:
    get:
      description: "Serviço para consulta de dados de faixas de nosso número disponí\
        veis. \nQuando o campo validaDigitoVerificadorNossoNumero retornar o valor\
        \ \"0\" a faixa \"numeroInicial\" e \"numeroFinal\" refere-se a numeração\
        \ final (exemplo: 10 e 15 - utilização: 1-0 1-1 1-2 1-3 1-4 1-5).\nMas se\
        \ o campo validaDigitoVerificadorNossoNumero retornar o valor \"1\" a faixa\
        \ \"numeroInicial\" e \"numeroFinal\" deverá ser calculado o DV (exemplo:\
        \ 10 e 15 - utilização: 10-4 11-8 12-0 13-1 14-7 15-9)."
      parameters:
      - description: Número que identifica o contrato do beneficiário no Sisbr.
        in: query
        name: numeroCliente
        required: true
        schema:
          type: integer
      - description: |-
          Identifica a modalidade do boleto.
          - 1 - SIMPLES COM REGISTRO
          - 3 - CAUCIONADA
          - 4 - VINCULADA
          - 8 - COBRANÇA CONTA CAPITAL
        in: query
        name: codigoModalidade
        required: true
        schema:
          type: integer
      - description: Quantidade mínima de nosso números que devem estar disponíveis
          na faixa a ser pesquisada.
        in: query
        name: quantidade
        required: true
        schema:
          type: integer
      - description: Indicar o id do contatro de cobrança
        in: query
        name: numeroContratoCobranca
        schema:
          format: int64
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_boletos_faixas_nosso_numero_get_200_response"
          description: ""
        "204":
          content: {}
          description: A requisição foi processada com êxito e não está retornando
            conteúdo.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Possíveis erros de negócio.
        "406":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Possíveis erros de inconsistência nos dados passados.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Erro interno.
      summary: Consulta de dados de faixas de nosso número disponíveis.
      tags:
      - Boleto
      x-sicoob-category: NÃO FINANCEIRA
      x-accepts:
      - application/json
  /boletos/{nossoNumero}:
    patch:
      description: |-
        Serviço para alteração de dados de boleto já registrado.  Deve ser feita a alteração de somente um objeto do boleto por requisição.
        **Objetos de alteração do boleto:**
        - seuNumero
        - desconto
        - abatimento
        - multa
        - jurosMora
        - rateioCredito
        - pix
        - prorrogacaoVencimento
        - prorrogacaoLimitePagamento
      parameters:
      - description: Número que identifica o boleto de cobrança no Sisbr
        in: path
        name: nossoNumero
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BoletoAlteracao"
        description: Informações do boleto de cobrança
        required: true
      responses:
        "204":
          content: {}
          description: Alteração realizada com sucesso.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Possíveis erros de negócio.
        "406":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Possíveis erros de inconsistência nos dados passados.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Erro interno
      summary: Alterar dados de um boleto
      tags:
      - Boleto
      x-sicoob-category: NÃO FINANCEIRA
      x-codegen-request-body-name: boleto
      x-content-type: application/json
      x-accepts:
      - application/json
  /boletos/{nossoNumero}/baixar:
    post:
      description: Serviço para comandar a baixa de boletos informados.
      parameters:
      - description: Número que identifica o boleto de cobrança no Sisbr
        in: path
        name: nossoNumero
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BoletoBaixa"
        description: Informações do boleto de cobrança
        required: true
      responses:
        "204":
          content: {}
          description: Solicitação recebida com sucesso.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Possíveis erros de negócio.
        "406":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Possíveis erros de inconsistência nos dados passados.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Erro interno
      summary: Comandar a baixa de boletos
      tags:
      - Boleto
      x-sicoob-category: NÃO FINANCEIRA
      x-codegen-request-body-name: boleto
      x-content-type: application/json
      x-accepts:
      - application/json
  /pagadores:
    put:
      description: Serviço para alterar informações do cadastro do pagador.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Pagador"
        description: Informações do pagador.
        required: true
      responses:
        "204":
          content: {}
          description: Solicitação recebida com sucesso.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Possíveis erros de negócio.
        "406":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Possíveis erros de inconsistência nos dados passados.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Erro interno
      summary: Alterar informações do cadastro do pagador.
      tags:
      - Pagador
      x-sicoob-category: NÃO FINANCEIRA
      x-codegen-request-body-name: pagador
      x-content-type: application/json
      x-accepts:
      - application/json
  /boletos/{nossoNumero}/negativacoes:
    delete:
      description: Serviço para comandar uma baixa da negativação de pagadores de
        boletos informados. Será enviado um pedido de baixa para o serviço de proteção
        ao crédito.
      parameters:
      - description: Número que identifica o boleto de cobrança no Sisbr
        in: path
        name: nossoNumero
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Negativacao"
        description: Informações do boleto de cobrança.
        required: true
      responses:
        "204":
          content: {}
          description: Solicitação recebida com sucesso.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Possíveis erros de negócio.
        "406":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Possíveis erros de inconsistência nos dados passados.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Erro interno
      summary: Baixar a negativação de pagadores de boletos
      tags:
      - Negativação
      x-sicoob-category: NÃO FINANCEIRA
      x-codegen-request-body-name: boleto
      x-content-type: application/json
      x-accepts:
      - application/json
    patch:
      description: Serviço para cancelar o apontamento da negativação de pagadores
        de boletos informados. O boleto não será enviado ao serviço de proteção ao
        crédito.
      parameters:
      - description: Número que identifica o boleto de cobrança no Sisbr
        in: path
        name: nossoNumero
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Negativacao"
        description: Informações do boleto.
        required: true
      responses:
        "204":
          content: {}
          description: Solicitação recebida com sucesso.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Possíveis erros de negócio.
        "406":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Possíveis erros de inconsistência nos dados passados.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Erro interno
      summary: Cancelar o apontamento da negativação de pagadores de boletos
      tags:
      - Negativação
      x-sicoob-category: NÃO FINANCEIRA
      x-codegen-request-body-name: boleto
      x-content-type: application/json
      x-accepts:
      - application/json
    post:
      description: "Serviço para indicar a negativação de pagadores de boletos informados.\
        \ A negativação é o registro de pendências ou restrições nos órgãos de proteç\
        ão ao crédito. No Sicoob, o parceiro para este serviço é o SERASA."
      parameters:
      - description: Número que identifica o boleto de cobrança no Sisbr
        in: path
        name: nossoNumero
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Negativacao"
        description: Informações do boleto de cobrança.
        required: true
      responses:
        "204":
          content: {}
          description: Solicitação recebida com sucesso.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Possíveis erros de negócio.
        "406":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Possíveis erros de inconsistência nos dados passados.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Erro interno
      summary: Negativar pagadores de boletos
      tags:
      - Negativação
      x-sicoob-category: NÃO FINANCEIRA
      x-codegen-request-body-name: boletos
      x-content-type: application/json
      x-accepts:
      - application/json
  /boletos/{nossoNumero}/protestos:
    delete:
      description: "Este serviço realiza o pedido de desistência do protesto de boletos\
        \ informados. O pedido de desistência não garante que o protesto será retirado.\
        \ Deve-se aguardar o retorno do cartório. O pedido de desistência pode ser\
        \ realizado a qualquer momento, desde que haja um apontamento prévio."
      parameters:
      - description: Número que identifica o boleto de cobrança no Sisbr
        in: path
        name: nossoNumero
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Protesto"
        description: Informações do boleto de cobrança.
        required: true
      responses:
        "204":
          content: {}
          description: Solicitação recebida com sucesso.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Possíveis erros de negócio.
        "406":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Possíveis erros de inconsistência nos dados passados.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Erro interno
      summary: Desistir do protesto de boletos
      tags:
      - Protesto
      x-sicoob-category: NÃO FINANCEIRA
      x-codegen-request-body-name: boleto
      x-content-type: application/json
      x-accepts:
      - application/json
    patch:
      description: "Este serviço realiza a indicação de cancelamento de protesto de\
        \ boletos informados. Os boletos em atraso e não pagos podem ser indicados\
        \ a protesto. Caso seja realizado no mesmo dia, pode-se cancelar o apontamento\
        \ a protesto."
      parameters:
