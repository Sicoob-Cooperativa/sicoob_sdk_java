      - description: Número da página. Quando não utilizar o query parameter data
          é obrigatório que seja sempre repassado o valor 1 neste query parameter.
          Quando utilizar o query parameter data a página deverá estar contidada dentro
          do retorno do objeto paginação atributo 'totalPaginas'.
        in: query
        name: pagina
        required: true
        schema:
          type: number
      - description: "Data de movimento. Utilizar padrão: yyyy-MM-dd."
        in: query
        name: data
        schema:
          format: date
          type: string
