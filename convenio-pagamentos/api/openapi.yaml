  /debito-automatico/optantes/convenios:
    get:
      description: Lista os convênios que estão aptos a trabalhar com débito automático.
      parameters:
      - description: Código identificador da transação do parceiro.
        in: query
        name: transacao
        required: true
        schema:
          type: number
      - description: |
          Parâmetro que indica a listagem completa dos convenios ou apenas os convênios que permitem o cadastro de optante
           * `true` - LISTA TODOS OS CONVÊNIOS QUE ESTÃO DISPONÍVEIS NA API
           * `false` - APENAS OS CONVÊNIOS QUE PERMITEM O CADASTRO DE OPTANTE
        in: query
        name: todosConvenios
        schema:
          default: false
          type: boolean
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Convenios"
          description: Consulta realizada com sucesso.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Possíveis erros de negócio.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Erro interno.
