  /arrecadacao/codigo-barras/{codigoBarras}/pagamentos:
    get:
      description: "Este serviço tem como objetivo a consulta de informações de um\
        \ código de barras. \n\nPara parceiros do \"**Parceiro Banco Sicoob**\", o\
        \ atributo nsu (Número Sequencial Único), obrigatório para a transação de\
        \ pagamento.\n\n\n **Exclusivo para o perfil \"Parceiro Banco Sicoob\":**\n\
        \  - O atributo 'recebimentoViaCaixa' uso exclusivo por este perfil."
      parameters:
      - description: Número do código de barras (sem dígito verificador).
        in: path
        name: codigoBarras
        required: true
        schema:
          type: string
      - description: "Número identificador da instituição: para os cooperados, este\
          \ campo deve conter o número da cooperativa. Para os parceiros, solicitamos\
          \ que verifiquem com a área gestora o valor a ser informado."
        in: query
        name: instituicao
        required: true
        schema:
          type: number
      - description: Código identificador da transação do parceiro.
        in: query
        name: transacao
        schema:
          type: number
      - description: "Data de movimento. Formato RFC 3339, seção 5.6."
        in: query
        name: dataMovimento
        required: true
        schema:
          format: date
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetornoCodigoBarras"
          description: Consulta realizada com sucesso.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Possíveis erros de negócio.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Erro interno.
      summary: Consulta informações sobre o pagamento associado ao código de barras
        e à data de movimentação.
      tags:
      - Arrecadação
      x-accepts:
      - application/json
    post:
      description: "Este serviço tem como objetivo a arrecadação de convênios por\
        \ meio de código de barras. \n\n**Recomendação:**\n  - Consultar o serviç\
        o '/arrecadacao/convenios-habilitados' para verificar quais convênios estã\
        o disponíveis através desta API.\n\n\n**Exclusivo para o perfil \"Parceiro\
        \ Banco Sicoob\":**\n  - O atributo nsu (Número Sequencial Único), obrigató\
        rio para a execução deste serviço.\n  - Deverá consultar o serviço '/arrecadacao/codigo-barras/{codigoBarras}'\n\
        \  - O atributo 'recebimentoViaCaixa' somente poderá ser informado por este\
        \ perfil."
      parameters:
      - description: Número do código de barras (sem dígito verificador).
        in: path
        name: codigoBarras
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/_arrecadacao_codigo_barras__codigoBarras__pagamentos_post_request"
        description: Metadados para arrecadação de convênios.
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_arrecadacao_codigo_barras__codigoBarras__pagamentos_post_200_response"
          description: Pagamento realizado com sucesso.
        "202":
          content: {}
          description: A transação esta pendente de assinatura.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Possíveis erros de negócio.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Erro interno.
      summary: Arrecadação de convênios por meio de código de barras
      tags:
      - Arrecadação
      x-codegen-request-body-name: arrecadacao
      x-content-type: application/json
      x-accepts:
      - application/json
  /arrecadacao/codigo-barras/{codigoBarras}:
    get:
      description: |-
        Este serviço tem como objetivo a consulta de informações de um código de barras e data de pagamento.

        **Recomendação:**
          - Consultar o serviço '/arrecadacao/convenios-habilitados' para verificar quais convênios estão disponíveis através desta API.


        **Exclusivo para o perfil "Parceiro Banco Sicoob":**
          - O atributo 'recebimentoViaCaixa' somente poderá ser informado por este perfil.
      parameters:
      - description: Número do código de barras (sem dígito verificador).
        in: path
        name: codigoBarras
        required: true
        schema:
          type: string
      - description: "Data de pagamento. Formato RFC 3339, seção 5.6 (yyyy-mm-dd)."
        in: query
        name: dataPagamento
        required: true
        schema:
          format: date
          type: string
      - description: Indica se o pagamento foi realizado via caixa.
        in: query
        name: recebimentoViaCaixa
        schema:
          type: boolean
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_arrecadacao_codigo_barras__codigoBarras__get_200_response"
          description: Consulta realizada com sucesso.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Possíveis erros de negócio.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Erro interno.
      summary: Consulta informações do código de barras
      tags:
      - Arrecadação
      x-accepts:
      - application/json
  /arrecadacao/pagamentos/{nsu}/comprovante:
    get:
      description: "Este serviço tem como objeto o retorno das informações de uma\
        \ arrecadação contendo a segunda via do comprovante. \n\n\n **Exclusivo para\
        \ o perfil \"Parceiro Banco Sicoob\":**\n  - O atributo 'recebimentoViaCaixa'\
        \ uso exclusivo por este perfil.\n  "
      parameters:
      - description: "Número sequencial único: código que identifica a transação de\
          \ arrecadação realizada."
        in: path
        name: nsu
        required: true
        schema:
          type: number
      - description: "Número identificador da instituição: para os cooperados, este\
          \ campo deve conter o número da cooperativa. Para os parceiros, solicitamos\
          \ que verifiquem com a área gestora o valor a ser informado."
        in: query
        name: instituicao
        required: true
        schema:
          type: number
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_arrecadacao_pagamentos__nsu__comprovante_get_200_response"
          description: Retorno da segunda via do comprovante de pagamento.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Possíveis erros de negócio.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Erro interno.
      summary: Consulta de segunda via de pagamento.
      tags:
      - Arrecadação
      x-accepts:
      - application/json
  /arrecadacao/conciliacoes:
    get:
      description: Este serviço tem como objeto a consulta de informações sintéticas
        das arrecadações realizadas em uma data de movimento.
      parameters:
      - description: "Data de movimento. Formato RFC 3339, seção 5.6."
        in: query
        name: dataMovimento
        required: true
        schema:
          format: date
          type: string
      - description: "Número identificador da instituição: para os cooperados, este\
          \ campo deve conter o número da cooperativa. Para os parceiros, solicitamos\
          \ que verifiquem com a área gestora o valor a ser informado."
        in: query
        name: instituicao
        required: true
        schema:
          type: number
      - description: Número identificador da unidade.
        in: query
        name: unidade
        schema:
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conciliacao"
          description: Consulta realizada com sucesso.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Possíveis erros de negócio ao exibir as informações de convênios.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Erro interno.
      summary: Consulta de conciliação das arrecadações.
      tags:
      - Arrecadação
      x-accepts:
      - application/json
  /arrecadacao/convenios-habilitados:
    get:
      description: '''Este serviço tem como objetivo retornar uma listagem contendo
        os convênios habilitados para arrecadação nesta API''.'
      parameters:
      - description: Código identificador da transação do cliente.
        in: query
        name: transacao
        required: true
        schema:
          type: number
      - description: "Número identificador da instituição: para os cooperados, este\
          \ campo deve conter o número da cooperativa. Para os parceiros, solicitamos\
          \ que verifiquem com a área gestora o valor a ser informado."
        in: query
        name: instituicao
        required: true
        schema:
          type: number
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConveniosHabilitados"
          description: Consulta realizada com sucesso.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Possíveis erros de negócio.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Erro interno.
      summary: Listagem de convênios habilitados.
      tags:
      - Arrecadação
      x-accepts:
      - application/json
