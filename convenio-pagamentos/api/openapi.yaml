              schema:
                $ref: "#/components/schemas/RetornoAlteracoesOptante"
          description: Consulta realizada com sucesso.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Possíveis erros de negócio ao exibir as informações de convênios.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Erro interno.
      summary: "Alterações da identificação do cliente realizado pela Empresa para\
        \ o Banco, conforme padrão Febraban"
