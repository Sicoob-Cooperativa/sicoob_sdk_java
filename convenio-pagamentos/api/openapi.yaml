        \ (tipo E), padrão FEBRABAN registro F."
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/_debito_automatico_debitos_post_request"
        description: Requisição para o cadastramento do retorno do débito automático.
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_debito_automatico_debitos_post_201_response"
          description: Retorno de débito cadastrado com sucesso.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Possíveis erros de negócio.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Erro interno.
      summary: Cadastramento do retorno do débito automático.
      tags:
      - Débitos Automáticos
      x-codegen-request-body-name: debito
      x-content-type: application/json
      x-accepts:
      - application/json
  /debito-automatico/debitos/{autenticacao}:
