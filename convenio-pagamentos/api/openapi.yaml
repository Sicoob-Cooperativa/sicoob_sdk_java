                $ref: "#/components/schemas/RetornoDebitoAutomaticoLote"
          description: Solicitação recebida com sucesso. Verifique o status de cada
            registro no retorno.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Possíveis erros de negócio.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Erro interno.
      summary: Retorno de débitos automáticos em lote.
      tags:
      - Débitos Automáticos
      x-codegen-request-body-name: respostaDebitosLote
      x-content-type: application/json
      x-accepts:
