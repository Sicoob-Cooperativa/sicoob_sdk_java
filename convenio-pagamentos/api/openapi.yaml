      - description: Código identificador da transação do parceiro.
        in: query
        name: transacao
        required: true
        schema:
          type: number
      - description: Identificador do cliente na empresa.
        in: query
        name: identificadorClienteEmpresa
        required: true
        schema:
          type: string
      - description: Código do convênio.
        in: query
        name: convenio
        required: true
        schema:
          type: string
      - description: Identificador do cliente no banco.
        in: query
        name: identificadorClienteBanco
        schema:
          type: string
      - description: "Ano de pesquisa, usar o padrão AAAA."
        in: query
        name: ano
        schema:
          type: number
      responses:
