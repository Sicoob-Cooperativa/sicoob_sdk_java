        in: query
        name: transacao
        required: true
        schema:
          type: number
      - description: Número da página. Quando não utilizar o query parameter data
          é obrigatório que seja sempre repassado o valor 1 neste query parameter.
          Quando utilizar o query parameter data a página deverá estar contidada dentro
          do retorno do objeto paginação atributo 'totalPaginas'.
        in: query
        name: pagina
        required: true
        schema:
          type: number
      - description: "Data de movimento. Utilizar padrão: yyyy-MM-dd."
        in: query
        name: data
        required: true
        schema:
          format: date
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DebitosMovimento"
          description: Consulta realizada com sucesso.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Possíveis erros de negócio ao exibir as informações de convênios.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Erro interno.
      summary: Consulta a movimentação dos débitos.
      tags:
      - Débitos Automáticos
      x-accepts:
      - application/json
    post:
      description: Serviço para o envio de registros tipo F (padrão FEBRABAN) de débitos
