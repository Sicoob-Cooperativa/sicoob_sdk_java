      description: Consulta os dados de retorno de um débito automático usando a chave
        de autenticação.
      parameters:
      - description: Chave de autenticacao.
        in: path
        name: autenticacao
        required: true
        schema:
          type: string
      - description: Código identificador da transação do parceiro.
        in: query
        name: transacao
        required: true
        schema:
          type: number
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetornoDebitoAutomatico"
          description: Consulta realizada com sucesso.
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
          description: Possíveis erros de negócio ao exibir as informações de convênios.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MensagensErro"
