openapi: 3.0.1
info:
  contact:
    email: dev@sicoob.com.br
    name: Área de Relacionamento
  description: |-
    <pre>[ Base URL: https://api.sicoob.com.br/convenios-pagamentos/v2 ]</pre>
    A <b>API de Arrecadação de Convênios</b> disponibiliza serviços que permitem a liquidação de convênios de arrecadação firmados pelo Banco Sicoob com entes públicos ou concessionárias. Ao habilitar a API, cada usuário será atribuído a um perfil de acesso:

    <b>Cooperado</b> – Perfil destinado a pequenos volumes de arrecadação.

    <b>Parceiro Cooperativa</b> – Perfil com alta taxa de requisições dentro de um intervalo de tempo.

    <b>Parceiro Banco</b> – Perfil com alta taxa de requisições dentro de um intervalo de tempo.

    O cooperado ou correntista do Sicoob deverá verificar sua situação cadastral junto à cooperativa para aderir ao perfil que melhor se enquadra às suas necessidades. Para parceiros <b>Cooperativa</b> ou <b>Banco Sicoob</b>, que demandam o processamento de grandes volumes de transações de arrecadação de convênios, o acesso é segmentado, assegurando <b>performance</b> e <b>integridade</b> na execução.

    <b>Regras para grandes volumes de arrecadação:</b> Parceiros que necessitam consumir uma alta taxa de requisições em intervalos de milissegundos devem observar o <b>Rate Limit</b> definido pelo serviço. Esse limite restringe a quantidade de chamadas permitidas por segundo, evitando bloqueios ou erros de excesso de requisições (<b>HTTP 429</b>).

    Para otimizar o desempenho, parceiros que utilizam a API com grande volume ou múltiplas requisições por segundo serão caracterizados e tratados de forma diferenciada, garantindo uma abordagem adequada às suas demandas.

    <b>Parceiros de grande volume serão classificados em dois tipos:</b>

    <b>Parceiro Banco Sicoob</b>: parceiro com contrato de arrecadação de convênios ativo diretamente com o Banco Sicoob.

    <b>Parceiro Cooperativa</b>: parceiro com contrato de arrecadação de convênios ativo com a Cooperativa e vinculado ao Banco Sicoob.

    <b>Orientações de suporte:</b>
    Em caso de necessidade de processamento de grandes volumes de requisições, recomendamos entrar em contato com a <b>Área de Relacionamento da sua Cooperativa</b> ou diretamente com a <b>Gerência de Operações Bancárias II</b>, por meio dos canais oficiais de comunicação disponíveis.

    <b>Observação importante:</b>
    <b>Exclusivo para o perfil “Parceiro Banco Sicoob”:</b> no serviço de arrecadação com <b>código de barras</b>, é obrigatório informar o atributo <b>NSU</b> na transação.

    <b>Atenção:</b>
    Outra maneira fácil de entrar em contato com o suporte de APIs do Sicoob é via WhatsApp. Basta escrever o termo <b>#API</b> e enviar para o número <b>61 4000-1111</b>. O time de suporte estará disponível para atendê-lo das 09h às 18h30 durante os dias úteis.
