    PaymentTransaction_debtorAccount:
      description: Objeto com os dados da conta do Debitor.
      example:
        number: xxxxx
        accountType: CACC
        personType: NATURAL_PERSON
        issuer: xxxx
      properties:
        issuer:
          description: Numero da agência.
          example: xxxx
          type: string
        number:
          description: Numero da conta.
          example: xxxxx
          type: string
        accountType:
          description: "Identifica o tito da conta como CACC(Conta-Corrente), SLRY(Conta-Salario),\
            \ SVGS(Conta-Poupanca) e TRAN(Conta-Pagamento)"
          enum:
          - CACC
          - SLRY
          - SVGS
          - TRAN
          type: string
        personType:
          description: Identifica o tipo da pessoa Fisica(NATURAL_PERSON) ou Juridica(LEGAL_PERSON).
          enum:
          - NATURAL_PERSON
          - LEGAL_PERSON
          type: string
      required:
      - accountType
      - issuer
      - number
      - personType
      type: object
